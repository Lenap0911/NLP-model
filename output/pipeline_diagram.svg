<text x="120" y="660.8333333333334" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A252F" text-anchor="start" style="">Sentence segmentation via spaCy  (en_core_web_sm / es_core_news_sm / pt_core_news_sm)</text>
<text x="120" y="684.1666666666667" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A252F" text-anchor="start" style="">Morphological POS tagging: imperative and subjunctive verb detection per sentence</text>
<text x="120" y="707.5" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A252F" text-anchor="start" style="">Trilingual keyword counting: imperative verbs · short-term urgency · long-term recovery · spatial anchors</text>
<text x="120" y="730.8333333333334" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A252F" text-anchor="start" style="">Semantic Role Labelling completeness: agent + action + location co-presence (srl_complete)</text>
<text x="120" y="754.1666666666667" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A252F" text-anchor="start" style="">Advice-framing verb flag: recommends / urges / suggests  (distinct from direct imperatives)</text>
<text x="120" y="777.5" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A252F" text-anchor="start" style="">Weighted density score → min-max normalised actionability_probability [0, 1]</text>
